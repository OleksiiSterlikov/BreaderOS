{% extends "base.html" %}
{% block content %}
        <div id="main">
            <div class="sidebar">
                <ul>
                    {% for item in tree %}
                        {% with item=item %}
                            {% include "tree_node.html" %}
                        {% endwith %}
                    {% endfor %}
                </ul>
            </div>
            <div id="viewer-panel">
                <div id="viewer-toolbar">
                    <button id="nav-prev" disabled>⬅ Попередня</button>
                    <button id="nav-next" disabled>Наступна ➡</button>
                </div>
                <iframe id="viewer" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
            </div>
        </div>
{% endblock %}
