<li>
    {% if item.is_dir %}
        <div class="folder" data-path="{{ item.fullpath }}">
            📁 {{ item.name }}
        </div>

        <ul class="hidden"></ul>
    {% else %}
        <div class="file"
             data-path="{{ item.fullpath }}">
            📄 {{ item.name }}
        </div>
    {% endif %}
</li>
