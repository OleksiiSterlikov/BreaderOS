<li class="tree-node">
    {% if item.is_dir %}
        <button class="tree-item folder" type="button" data-path="{{ item.fullpath }}">
            <span class="tree-icon" aria-hidden="true">▸</span>
            <span class="tree-label">{{ item.name }}</span>
        </button>
        <ul class="hidden"></ul>
    {% else %}
        <button class="tree-item file" type="button" data-path="{{ item.fullpath }}">
            <span class="tree-icon" aria-hidden="true">•</span>
            <span class="tree-label">{{ item.name }}</span>
        </button>
    {% endif %}
</li>
