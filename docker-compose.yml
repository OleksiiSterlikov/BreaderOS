version: "3.9"

services:
  app:
    container_name: breaderos_app
    build: .
    expose:
      - "5000"
    volumes:
      - .:/app
      - ./static:/app/static
#      - ./static/books:/app/static/books
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: breaderos_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app:ro

    depends_on:
      - app
    restart: unless-stopped
